<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VNCEFLIX — Choose Your Plan</title>
<link rel="icon" href="img/logo.png" type="image/png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#E50914;--bg-deep:#05080f;--bg-base:#080d18;--bg-card:#0d1626;
  --bg-card-hover:#111e33;--border-subtle:rgba(255,255,255,0.06);--border-mid:rgba(255,255,255,0.12);
  --text-primary:#f0f2f5;--text-secondary:#8896aa;--text-muted:#3d5068;
  --font-display:'Outfit',sans-serif;--font-body:'DM Sans',sans-serif;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--transition:0.22s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;}
body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(229,9,20,0.09) 0%,transparent 60%);}

/* Spinner */
#preloader{position:fixed;inset:0;background:rgba(5,8,15,0.92);display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.3s ease;}
#preloader.hide{opacity:0;pointer-events:none;}
.four-box-spinner{display:flex;flex-wrap:wrap;gap:5px;width:46px;height:46px;}
.four-box-spinner div{width:19px;height:19px;background:var(--accent);border-radius:3px;animation:boxFade 1.2s infinite ease-in-out;}
.four-box-spinner div:nth-child(2){animation-delay:.2s;}.four-box-spinner div:nth-child(3){animation-delay:.4s;}.four-box-spinner div:nth-child(4){animation-delay:.6s;}
@keyframes boxFade{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.2;transform:scale(0.65);}}

/* Topbar */
.sub-topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 5%;border-bottom:1px solid var(--border-subtle);}
.sub-topbar img{height:28px;}
.skip-link{font-family:var(--font-display);font-size:0.8rem;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color var(--transition);}
.skip-link:hover{color:var(--text-secondary);}

/* Hero */
.sub-hero{position:relative;z-index:1;text-align:center;padding:4rem 1rem 1.5rem;}
.sub-step{font-family:var(--font-display);font-size:0.72rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:0.6rem;}
.sub-title{font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--text-primary);line-height:1.15;margin-bottom:0.6rem;}
.sub-title span{color:var(--accent);}
.sub-desc{font-size:0.92rem;color:var(--text-secondary);max-width:520px;margin:0 auto 1.5rem;}

/* Billing toggle */
.billing-toggle{display:inline-flex;align-items:center;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-xl);padding:4px;gap:2px;margin-bottom:0.6rem;}
.billing-btn{font-family:var(--font-display);font-size:0.8rem;font-weight:600;padding:7px 20px;border-radius:var(--radius-xl);border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all var(--transition);}
.billing-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(229,9,20,0.3);}
.billing-btn:not(.active):hover{color:var(--text-secondary);}
.save-badge{display:inline-block;background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);border-radius:20px;font-family:var(--font-display);font-size:0.65rem;font-weight:700;padding:2px 9px;margin-left:0.5rem;vertical-align:middle;}

/* Plans grid */
.plans-wrap{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.2rem;max-width:900px;margin:2.5rem auto;padding:0 5%;}

/* Plan card */
.plan-card{
  background:var(--bg-card);border:2px solid var(--border-subtle);border-radius:var(--radius-lg);
  padding:2rem 1.6rem;cursor:pointer;position:relative;
  transition:border-color var(--transition),transform var(--transition),box-shadow var(--transition);
  display:flex;flex-direction:column;
}
.plan-card:hover{border-color:var(--border-mid);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,0.5);}
.plan-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 16px 48px rgba(229,9,20,0.2);}
.plan-card.popular{border-color:rgba(229,9,20,0.5);}
/* Popular badge */
.popular-badge{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;font-family:var(--font-display);
  font-size:0.65rem;font-weight:800;padding:3px 14px;border-radius:20px;
  text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;
}
/* Plan header */
.plan-name{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:0.2rem;}
.plan-tagline{font-size:0.78rem;color:var(--text-muted);margin-bottom:1.2rem;}
/* Pricing */
.plan-price-row{display:flex;align-items:baseline;gap:0.3rem;margin-bottom:0.25rem;}
.plan-price{font-family:var(--font-display);font-size:2.2rem;font-weight:800;color:var(--text-primary);line-height:1;}
.plan-currency{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--text-secondary);margin-top:6px;}
.plan-period{font-size:0.78rem;color:var(--text-muted);}
.plan-price-annual{font-size:0.75rem;color:#4ade80;margin-bottom:1.2rem;}
/* Feature list */
.plan-features{list-style:none;display:flex;flex-direction:column;gap:0.6rem;flex:1;margin-bottom:1.6rem;}
.plan-features li{display:flex;align-items:center;gap:0.5rem;font-size:0.84rem;color:var(--text-secondary);}
.plan-features li i{font-size:1rem;color:#4ade80;flex-shrink:0;}
.plan-features li.unavail{color:var(--text-muted);}
.plan-features li.unavail i{color:var(--text-muted);}
/* Select button */
.plan-select-btn{
  display:flex;align-items:center;justify-content:center;gap:0.4rem;
  width:100%;padding:0.72rem;border-radius:var(--radius-xl);border:2px solid var(--border-mid);
  background:transparent;color:var(--text-secondary);
  font-family:var(--font-display);font-size:0.85rem;font-weight:600;cursor:pointer;
  transition:all var(--transition);margin-top:auto;
}
.plan-card.selected .plan-select-btn{background:var(--accent);border-color:var(--accent);color:#fff;}
.plan-card:not(.selected) .plan-select-btn:hover{border-color:var(--border-mid);color:var(--text-primary);background:rgba(255,255,255,0.05);}

/* CTA */
.sub-cta{position:relative;z-index:1;text-align:center;padding:0 5% 4rem;}
.cta-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;
  padding:0.9rem 3rem;border:none;border-radius:var(--radius-xl);
  background:var(--accent);color:#fff;font-family:var(--font-display);
  font-size:1rem;font-weight:700;cursor:pointer;transition:all var(--transition);
  box-shadow:0 8px 28px rgba(229,9,20,0.35);margin-bottom:0.8rem;
}
.cta-btn:hover{background:#ff1a25;transform:translateY(-2px);box-shadow:0 14px 36px rgba(229,9,20,0.5);}
.cta-btn:disabled{opacity:0.5;cursor:default;transform:none;}
.cta-note{font-size:0.78rem;color:var(--text-muted);}
.cta-note a{color:var(--text-muted);text-decoration:underline;}

/* FAQ section */
.faq-section{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 5% 4rem;}
.faq-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:1.5rem;}
.faq-item{border-top:1px solid var(--border-subtle);padding:1rem 0;}
.faq-question{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:var(--font-display);font-size:0.88rem;font-weight:600;color:var(--text-primary);gap:1rem;}
.faq-question i{flex-shrink:0;transition:transform 0.25s ease;color:var(--text-muted);}
.faq-item.open .faq-question i{transform:rotate(180deg);color:var(--accent);}
.faq-answer{font-size:0.83rem;color:var(--text-muted);line-height:1.65;max-height:0;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease;}
.faq-item.open .faq-answer{max-height:200px;padding-top:0.6rem;}

/* Toast */
#toast-container{position:fixed;top:1.2rem;right:1.2rem;z-index:10000;display:flex;flex-direction:column;gap:0.5rem;}
.toast-item{background:var(--bg-card);border:1px solid var(--border-mid);color:var(--text-primary);border-radius:var(--radius-md);padding:0.75rem 1.1rem;font-family:var(--font-body);font-size:0.83rem;box-shadow:0 8px 32px rgba(0,0,0,0.7);opacity:0;transform:translateX(20px);transition:all 0.3s ease;max-width:320px;display:flex;align-items:center;gap:0.5rem;}
.toast-item.show{opacity:1;transform:translateX(0);}
.toast-item.success{border-left:3px solid #22c55e;}.toast-item.danger{border-left:3px solid var(--accent);}.toast-item.warning{border-left:3px solid #f59e0b;}

/* Auth-gated message */
.auth-gate{text-align:center;padding:5rem 1rem;}
.auth-gate i{font-size:3rem;color:var(--text-muted);margin-bottom:1rem;}
.auth-gate h3{font-family:var(--font-display);font-size:1.1rem;color:var(--text-primary);margin-bottom:0.5rem;}
.auth-gate p{font-size:0.85rem;color:var(--text-muted);margin-bottom:1.4rem;}
.auth-gate a{display:inline-flex;align-items:center;gap:0.4rem;padding:0.7rem 1.8rem;background:var(--accent);color:#fff;border-radius:var(--radius-xl);font-family:var(--font-display);font-size:0.85rem;font-weight:600;text-decoration:none;}

@media(max-width:768px){.plans-wrap{grid-template-columns:1fr;}.sub-title{font-size:1.7rem;}.plan-price{font-size:1.8rem;}}
</style>
</head>
<body>

<div id="preloader"><div class="four-box-spinner"><div></div><div></div><div></div><div></div></div></div>
<div id="toast-container"></div>

<!-- TOPBAR -->
<header class="sub-topbar">
  <a href="index.html"><img src="img/vnceflix.png" alt="VNCEFLIX"></a>
  <a href="index.html" class="skip-link"><i class='bx bx-x'></i> Skip for now</a>
</header>

<!-- HERO -->
<section class="sub-hero">
  <div class="sub-step">Step 2 of 2 · Choose your plan</div>
  <h1 class="sub-title">Unlimited movies &amp; series<br>from <span>₱0/month</span></h1>
  <p class="sub-desc">Watch on any device. Cancel anytime. No hidden fees.</p>

  <!-- Billing toggle -->
  <div>
    <div class="billing-toggle">
      <button class="billing-btn active" id="btn-monthly">Monthly</button>
      <button class="billing-btn" id="btn-annual">Annual <span class="save-badge">Save 30%</span></button>
    </div>
  </div>
</section>

<!-- PLANS -->
<div class="plans-wrap" id="plans-wrap">
  <!-- populated by JS -->
</div>

<!-- CTA -->
<div class="sub-cta">
  <button class="cta-btn" id="cta-btn" disabled>
    <i class='bx bx-right-arrow-alt'></i> Start Watching
  </button>
  <p class="cta-note">
    By continuing you agree to our <a href="#">Terms of Service</a>. Cancel anytime from account settings.
  </p>
</div>

<!-- FAQ -->
<section class="faq-section">
  <h2 class="faq-title">Frequently asked questions</h2>
  <div id="faq-list"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyBeCgogR5-ZgaU9eD_XwzH_L5LkT0TOcPc",authDomain:"vnce-7b54c.firebaseapp.com",projectId:"vnce-7b54c",storageBucket:"vnce-7b54c.appspot.com",messagingSenderId:"137661927526",appId:"1:137661927526:web:e649aceeb57126a2945da7"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

window.addEventListener("load",()=>document.getElementById("preloader").classList.add("hide"));

function showToast(msg,type="info"){
  const el=document.createElement("div");el.className=`toast-item ${type}`;
  el.innerHTML=`<i class='bx ${type==="success"?"bx-check-circle":type==="danger"?"bx-error-circle":"bx-info-circle"}'></i><span>${msg}</span>`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(()=>el.classList.add("show"),30);
  setTimeout(()=>{el.classList.remove("show");setTimeout(()=>el.remove(),350);},3500);
}

/* ── Plan definitions ── */
const PLANS=[
  {
    id:"free",name:"Free",tagline:"Great for casual watching",
    monthly:0,annual:0,currency:"₱",popular:false,
    features:[
      {label:"HD streaming (720p)",ok:true},
      {label:"2 simultaneous streams",ok:true},
      {label:"Movies & TV Shows",ok:true},
      {label:"Ad-supported",ok:true},
      {label:"Vivamax & Originals",ok:false},
      {label:"4K Ultra HD",ok:false},
      {label:"Download for offline",ok:false},
    ]
  },
  {
    id:"basic",name:"Basic",tagline:"Most popular for individuals",
    monthly:149,annual:104,currency:"₱",popular:true,
    features:[
      {label:"Full HD streaming (1080p)",ok:true},
      {label:"2 simultaneous streams",ok:true},
      {label:"All Movies & TV Shows",ok:true},
      {label:"Ad-free experience",ok:true},
      {label:"Vivamax & Originals",ok:true},
      {label:"4K Ultra HD",ok:false},
      {label:"Download for offline",ok:false},
    ]
  },
  {
    id:"premium",name:"Premium",tagline:"Best for families & power users",
    monthly:299,annual:209,currency:"₱",popular:false,
    features:[
      {label:"4K Ultra HD + HDR",ok:true},
      {label:"4 simultaneous streams",ok:true},
      {label:"All Movies & TV Shows",ok:true},
      {label:"Ad-free experience",ok:true},
      {label:"Vivamax & Originals",ok:true},
      {label:"Download for offline",ok:true},
    ]
  }
];

let billing="monthly"; // "monthly" | "annual"
let selectedPlan=null;
let currentUser=null;

/* ── Render plans ── */
function renderPlans(){
  const wrap=document.getElementById("plans-wrap");
  wrap.innerHTML="";
  PLANS.forEach(plan=>{
    const price=billing==="monthly"?plan.monthly:plan.annual;
    const priceStr=price===0?"Free":`${plan.currency}${price}`;
    const annualNote=billing==="annual"&&price>0?`Billed ${plan.currency}${price*12}/year`:"";
    const isSelected=selectedPlan===plan.id;
    const card=document.createElement("div");
    card.className=`plan-card${plan.popular?" popular":""}${isSelected?" selected":""}`;
    card.dataset.plan=plan.id;
    card.innerHTML=`
      ${plan.popular?`<div class="popular-badge">Most Popular</div>`:""}
      <div class="plan-name">${plan.name}</div>
      <div class="plan-tagline">${plan.tagline}</div>
      <div class="plan-price-row">
        ${price>0?`<span class="plan-currency">${plan.currency}</span>`:""}
        <span class="plan-price">${price===0?"Free":price}</span>
        ${price>0?`<span class="plan-period">/ mo</span>`:""}
      </div>
      ${annualNote?`<div class="plan-price-annual">${annualNote}</div>`:`<div style="margin-bottom:1.2rem;"></div>`}
      <ul class="plan-features">
        ${plan.features.map(f=>`<li class="${f.ok?"":"unavail"}"><i class='bx ${f.ok?"bx-check":"bx-x"}'></i>${f.label}</li>`).join("")}
      </ul>
      <button class="plan-select-btn">${isSelected?`<i class='bx bx-check-circle'></i> Selected`:`Select ${plan.name}`}</button>`;
    card.onclick=()=>selectPlan(plan.id);
    wrap.appendChild(card);
  });
}

function selectPlan(id){
  selectedPlan=id;
  renderPlans();
  const btn=document.getElementById("cta-btn");
  const p=PLANS.find(p=>p.id===id);
  btn.disabled=!currentUser;
  const price=billing==="monthly"?p.monthly:p.annual;
  btn.innerHTML=`<i class='bx bx-right-arrow-alt'></i> ${price===0?"Start Free":"Subscribe — "+p.currency+price+"/mo"}`;
}

/* Billing toggle */
document.getElementById("btn-monthly").onclick=()=>{billing="monthly";document.getElementById("btn-monthly").classList.add("active");document.getElementById("btn-annual").classList.remove("active");renderPlans();if(selectedPlan)selectPlan(selectedPlan);};
document.getElementById("btn-annual").onclick=()=>{billing="annual";document.getElementById("btn-annual").classList.add("active");document.getElementById("btn-monthly").classList.remove("active");renderPlans();if(selectedPlan)selectPlan(selectedPlan);};

/* ── CTA: save plan to Firestore → go to site ── */
document.getElementById("cta-btn").onclick=async()=>{
  if(!currentUser||!selectedPlan)return;
  const btn=document.getElementById("cta-btn");
  btn.disabled=true;btn.innerHTML=`<div class="four-box-spinner" style="width:20px;height:20px;gap:2px;"><div style="width:8px;height:8px;"></div><div style="width:8px;height:8px;"></div><div style="width:8px;height:8px;"></div><div style="width:8px;height:8px;"></div></div> Saving…`;
  try{
    await updateDoc(doc(db,"users",currentUser.uid),{
      plan:selectedPlan,
      billing,
      planStartedAt:new Date().toISOString()
    });
    showToast("Plan saved! Welcome to VNCEFLIX 🎉","success");
    setTimeout(()=>window.location.href="index.html",900);
  }catch(err){
    showToast(`Could not save plan: ${err.message}`,"danger");
    btn.disabled=false;btn.innerHTML=`<i class='bx bx-right-arrow-alt'></i> Start Watching`;
  }
};

/* ── Auth state ── */
onAuthStateChanged(auth,async(user)=>{
  currentUser=user;
  if(user){
    /* Check if already has plan */
    const snap=await getDoc(doc(db,"users",user.uid));
    if(snap.exists()&&snap.data().plan&&snap.data().plan!=="none"&&snap.data().plan){
      /* Pre-select current plan */
      selectedPlan=snap.data().plan;
    }
    renderPlans();
    if(selectedPlan){
      document.getElementById("cta-btn").disabled=false;
      const p=PLANS.find(p=>p.id===selectedPlan);
      const price=billing==="monthly"?p.monthly:p.annual;
      document.getElementById("cta-btn").innerHTML=`<i class='bx bx-right-arrow-alt'></i> ${price===0?"Start Free":"Subscribe — "+p.currency+price+"/mo"}`;
    }
  } else {
    /* Not logged in — show auth gate over plans */
    renderPlans();
    const wrap=document.getElementById("plans-wrap");
    const gate=document.createElement("div");
    gate.className="auth-gate";gate.style.gridColumn="1/-1";
    gate.innerHTML=`<i class='bx bx-lock-alt'></i><h3>Sign in to choose a plan</h3><p>Create a free account or sign in to get started.</p><a href="Auth/login.html"><i class='bx bx-log-in'></i> Sign In</a>`;
    wrap.appendChild(gate);
  }
});

/* ── FAQ ── */
const faqs=[
  {q:"Is there a free plan?",a:"Yes! The Free plan gives you access to a large library of movies and TV shows with ads. Upgrade anytime for an ad-free experience and Vivamax exclusives."},
  {q:"Can I cancel my subscription anytime?",a:"Absolutely. You can cancel anytime from your account settings. No lock-in contracts, no cancellation fees."},
  {q:"How many devices can I use?",a:"Free and Basic plans support 2 simultaneous streams. Premium supports up to 4. You can install and sign in on as many devices as you like."},
  {q:"What payment methods do you accept?",a:"We accept GCash, Maya, major credit/debit cards, and online banking. All payments are secured and processed by our payment partner."},
  {q:"What is 4K Ultra HD?",a:"4K Ultra HD (3840 × 2160) is 4× sharper than Full HD. Available on Premium plan on compatible TVs, monitors, and devices."},
];
const faqList=document.getElementById("faq-list");
faqs.forEach(item=>{
  const div=document.createElement("div");div.className="faq-item";
  div.innerHTML=`<div class="faq-question">${item.q}<i class='bx bx-chevron-down'></i></div><div class="faq-answer">${item.a}</div>`;
  div.querySelector(".faq-question").onclick=()=>{div.classList.toggle("open");};
  faqList.appendChild(div);
});

/* Initial render */
renderPlans();
</script>
</body>
</html>
