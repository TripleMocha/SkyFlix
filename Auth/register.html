<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VNCEFLIX - Register</title>
<link rel="icon" type="image/png" href="../img/BG/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
<style>
  body {
    margin: 0; padding: 0; min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; justify-content: space-between;
    background-image: url('../img/BG/loginbg.jpg'); background-size: cover; background-position: center;
    color: white;
  }
  body::before {
    content: "";
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: inherit; filter: blur(1px); z-index: -1;
  }
  .logo-wrapper { position: absolute; top:20px; left:100px; z-index:999; }
  .register-wrapper { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 0; }
  #registerForm {
    background-color: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
    padding:2.5rem 2rem; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.7);
    width:100%; max-width:400px; transition: all 0.3s ease;
  }
  #registerForm h4 { color:#fff; }
  .form-group { position: relative; margin-bottom:1.5rem; }
  .form-control {
    width:100%; padding:16px 15px; border-radius:5px; border:none;
    background-color: rgba(255,255,255,0.1); color:#fff; font-size:1rem;
    transition: all 0.3s ease;
  }
  .form-control::placeholder { color: rgba(255,255,255,0.6); transition: all 0.2s ease; }
  .form-control:focus {
    background-color: rgba(255,255,255,0.2); outline:none; color:#fff;
    box-shadow: 0 0 8px #E50914;
  }
  .form-group input:focus::placeholder,
  .form-group input:not(:placeholder-shown)::placeholder {
    font-size:0.75rem; transform: translateY(-1.5rem); opacity:1; color:#fff;
  }
  .password-wrapper { position: relative; }
  #togglePassword {
    position: absolute; top:50%; right:15px; transform: translateY(-50%);
    cursor: pointer; color:#fff; font-size:1.1rem;
  }
  .btn-primary { background-color:#E50914; border:none; font-weight:600; transition: background-color 0.3s ease; }
  .btn-primary:hover { background-color:#b0070f; box-shadow:none; }
  a { color:#fff; text-decoration:none; }
  a:hover { text-decoration: underline; }

  /* Preloader */
  #preloader { position:fixed; top:0; left:0; width:100%; height:100%;
    background-color: rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index:9999; }
  .four-box-spinner { width:50px; height:50px; display:flex; flex-wrap:wrap; gap:5px; }
  .four-box-spinner div { width:20px; height:20px; background-color:red;
    animation: boxFade 1.2s infinite ease-in-out; }
  .four-box-spinner div:nth-child(2) { animation-delay:0.2s; }
  .four-box-spinner div:nth-child(3) { animation-delay:0.4s; }
  .four-box-spinner div:nth-child(4) { animation-delay:0.6s; }
  @keyframes boxFade { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.3; transform:scale(0.7); } }

  /* Toast */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
</style>
</head>
<body>
<div id="preloader">
  <div class="four-box-spinner"><div></div><div></div><div></div><div></div></div>
</div>

<div class="logo-wrapper">
  <a href="login.html"><img src="../img/BG/vnceflix.png" alt="VNCEFLIX Logo" style="height:40px;"></a>
</div>

<section class="vh-100 w-100 register-wrapper">
  <div class="container h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-md-8 col-lg-6 col-xl-4">
        <form id="registerForm">
          <h4 class="fw-bold mb-4">Sign Up</h4>

          <div class="form-group mb-3">
            <input type="text" id="username" class="form-control" placeholder="Username" required />
          </div>

          <div class="form-group mb-3">
            <input type="email" id="email" class="form-control" placeholder="Email" required />
          </div>

          <div class="form-group password-wrapper mb-3">
            <input type="password" id="password" class="form-control" placeholder="Password" required />
            <i class="bi bi-eye-slash" id="togglePassword"></i>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100">Sign Up</button>
          <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeCgogR5-ZgaU9eD_XwzH_L5LkT0TOcPc",
  authDomain: "vnce-7b54c.firebaseapp.com",
  projectId: "vnce-7b54c",
  storageBucket: "vnce-7b54c.firebasestorage.app",
  messagingSenderId: "137661927526",
  appId: "1:137661927526:web:5a016a3e9de198b3945da7",
  measurementId: "G-3EQTYXT8W0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.addEventListener('load', () => {
  document.getElementById('preloader').style.display = 'none';
});

// Toast helper
function showToast(message, bg='danger') {
  const toastId = 'toast' + Date.now();
  const toastHTML = `
    <div id="${toastId}" class="toast align-items-center text-white bg-${bg} border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">${message}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>`;
  const container = document.getElementById('toastContainer');
  container.insertAdjacentHTML('beforeend', toastHTML);
  const toastEl = document.getElementById(toastId);
  const bsToast = new bootstrap.Toast(toastEl, { delay: 3000 });
  bsToast.show();
}

const registerForm = document.getElementById('registerForm');
registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const username = document.getElementById('username').value.trim();

  document.getElementById('preloader').style.display = 'flex';

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Detect device info
    const device = navigator.userAgent || "Unknown";
    // Get IP + location
    let ip = "Unknown", location = "Unknown";
    try {
      const res = await fetch("https://ipapi.co/json/");
      const data = await res.json();
      ip = data.ip || "Unknown";
      location = `${data.city || ''}, ${data.country_name || ''}`;
    } catch (err) {
      console.warn("Failed to fetch IP/location", err);
    }

    // Save user profile with initial values
    await setDoc(doc(db, "users", user.uid), {
      username: username,
      email: email,
      createdAt: serverTimestamp(),
      failedAttempts: 0,
      locked: false
    });

    // Log registration
    await addDoc(collection(db, "user_registrations"), {
      uid: user.uid,
      username: username,
      email: email,
      ip,
      location,
      device,
      registeredAt: serverTimestamp()
    });

    registerForm.reset();
    showToast("Account successfully created!", "success");
    setTimeout(() => { window.location.href = 'login.html'; }, 1200);

  } catch (error) {
    let msg = "Registration failed.";
    if (error.code === "auth/email-already-in-use") msg = "This email is already registered.";
    else if (error.code === "auth/weak-password") msg = "Password should be at least 6 characters.";
    else if (error.code === "auth/invalid-email") msg = "Invalid email format.";
    showToast(msg, "danger");
    document.getElementById('preloader').style.display = 'none';
  }
});

// Toggle password visibility
document.getElementById('togglePassword').addEventListener('click', function () {
  const passwordInput = document.getElementById('password');
  const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
  passwordInput.setAttribute('type', type);
  this.classList.toggle('bi-eye');
  this.classList.toggle('bi-eye-slash');
});
</script>
</body>
</html>
