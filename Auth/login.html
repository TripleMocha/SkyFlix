<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VNCEFLIX - Login</title>
  <link rel="icon" type="image/png" href="../img/BG/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; justify-content: space-between;
      background-image: url('../img/BG/loginbg.jpg');
      background-size: cover; background-position: center;
      color: white;
    }
    body::before {
      content: ""; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: inherit;
      filter: blur(1px); z-index: -1;
    }

    .logo-wrapper { position: absolute; top: 20px; left: 40px; z-index: 999; }
    .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 0; }

    #loginForm {
      background-color: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      padding: 2.5rem 2rem; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
      width: 100%; max-width: 400px;
      transition: all 0.3s ease;
    }
    #loginForm h2, #loginForm h4 { color: #fff; }
    .form-group { position: relative; margin-bottom: 1.5rem; }
    .form-control {
      width: 100%; padding: 16px 15px; border-radius: 5px; border: none;
      background-color: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; transition: all 0.3s ease;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.6); transition: all 0.2s ease; }
    .form-control:focus {
      background-color: rgba(255,255,255,0.2); outline: none; color: #fff;
      box-shadow: 0 0 8px #E50914;
    }
    .form-group input:focus::placeholder,
    .form-group input:not(:placeholder-shown)::placeholder {
      font-size: 0.75rem; transform: translateY(-1.5rem); opacity: 1; color: #fff;
    }
    .password-wrapper { position: relative; }
    #togglePassword {
      position: absolute; top: 50%; right: 15px; transform: translateY(-50%);
      cursor: pointer; color: #fff; font-size: 1.1rem;
    }
    .btn-primary { background-color: #E50914; border: none; font-weight: 600; transition: background-color 0.3s ease; }
    .btn-primary:hover { background-color: #b0070f; box-shadow: none; }
    .form-check-label, .text-body, .lead, .fw-bold { color: #fff !important; }
    a { color: #fff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer.bg-transparent { background-color: transparent !important; }

    .four-box-spinner {
      width: 50px; height: 50px; display: flex; flex-wrap: wrap; gap: 5px;
    }
    .four-box-spinner div {
      width: 20px; height: 20px; background-color: red;
      animation: boxFade 1.2s infinite ease-in-out;
    }
    .four-box-spinner div:nth-child(2) { animation-delay: 0.2s; }
    .four-box-spinner div:nth-child(3) { animation-delay: 0.4s; }
    .four-box-spinner div:nth-child(4) { animation-delay: 0.6s; }
    @keyframes boxFade { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.3;transform:scale(0.7);} }

    #toastContainer {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="logo-wrapper">
    <a href="login.html"><img src="../img/BG/vnceflix.png" alt="VNCEFLIX Logo" style="height: 40px;"></a>
  </div>

 <section class="vh-100 w-100 login-wrapper">
  <div class="container h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-md-8 col-lg-6 col-xl-4">
        <form id="loginForm">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Welcome!</h2>
            <h4 class="text-white mb-4">Sign in to your account</h4>
          </div>

          <div class="form-group">
            <input type="email" id="loginEmail" class="form-control" placeholder="Email address" required />
          </div>

          <div class="form-group password-wrapper">
            <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
            <i class="bi bi-eye-slash" id="togglePassword"></i>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check mb-0">
              <input class="form-check-input me-2" type="checkbox" id="rememberMe" checked />
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a href="#" id="resetPasswordBtn" class="text-white">Forgot Password</a>
          </div>

          <div class="text-center text-lg-start mt-4 pt-2">
            <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
            <p class="small mt-2 pt-1 mb-0">
              Don't have an account? 
              <a href="register.html" style="color: #1589FF; text-decoration: none;">Sign Up</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<div id="toastContainer"></div>

<footer class="bg-transparent text-white py-4 px-4 px-xl-5">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="text-start">&copy; 2025 VNCEFLIX. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeCgogR5-ZgaU9eD_XwzH_L5LkT0TOcPc",
  authDomain: "vnce-7b54c.firebaseapp.com",
  projectId: "vnce-7b54c",
  storageBucket: "vnce-7b54c.appspot.com",
  messagingSenderId: "137661927526",
  appId: "1:137661927526:web:5a016a3e9de198b3945da7",
  measurementId: "G-3EQTYXT8W0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const toastContainer = document.getElementById('toastContainer');
function showToast(message, type='info'){
  const toastEl = document.createElement('div');
  toastEl.className = `toast align-items-center text-white bg-${type} border-0`;
  toastEl.setAttribute('role','alert');
  toastEl.setAttribute('aria-live','assertive');
  toastEl.setAttribute('aria-atomic','true');
  toastEl.innerHTML = `<div class="d-flex">
    <div class="toast-body">${message}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
  </div>`;
  toastContainer.appendChild(toastEl);
  const toast = new bootstrap.Toast(toastEl,{delay:4000});
  toast.show();
  toastEl.addEventListener('hidden.bs.toast',()=>toastEl.remove());
}

// Log user activity
async function logUserActivity({ uid = null, email, action, errorMessage = null }) {
  try {
    let ip = 'Unknown', location = 'Unknown';
    try { const res = await fetch('https://ipapi.co/json/'); const data = await res.json(); ip = data.ip || 'Unknown'; location = [data.city, data.region, data.country_name].filter(Boolean).join(', ') || 'Unknown'; } catch {}
    await addDoc(collection(db,"userActivity"), { uid, email, action, errorMessage, ipAddress: ip, device: navigator.userAgent || 'Unknown', location, timestamp: serverTimestamp() });
  } catch(err){ console.warn("Failed logging user activity:", err); }
}

// Auto-fill email if remembered
document.addEventListener('DOMContentLoaded', () => {
  const rememberedEmail = localStorage.getItem('userEmail');
  if (rememberedEmail) {
    document.getElementById('loginEmail').value = rememberedEmail;
    document.getElementById('rememberMe').checked = true;
  }
});

// Login handler
const loginForm = document.getElementById('loginForm');
loginForm.addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value.trim();
  const rememberMe = document.getElementById('rememberMe').checked;

  const spinner = document.createElement('div');
  spinner.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:9999;';
  spinner.innerHTML = `<div class="four-box-spinner"><div></div><div></div><div></div><div></div></div>`;
  document.body.appendChild(spinner);

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;
    const userDocRef = doc(db, "users", uid);
    const userSnap = await getDoc(userDocRef);

    if (!userSnap.exists()) throw new Error("User data not found!");
    const userData = userSnap.data();

    if (userData.locked) {
      showToast("Your account is locked by system admin", "danger");
      await logUserActivity({ uid, email, action: "Login Failed - Locked" });
      await signOut(auth);
      return;
    }

    if (userData.failedAttempts && userData.failedAttempts > 0) {
      await updateDoc(userDocRef, { failedAttempts: 0 });
    }

    if (rememberMe) localStorage.setItem('userEmail', email);
    else localStorage.removeItem('userEmail');

    showToast("Login Successful!", "success");
    await logUserActivity({ uid, email, action: "Login Success" });
    loginForm.reset();
    setTimeout(() => window.location.href = "../../index.html", 1000);

  } catch(error) {
    console.log(error);

    // Increment failed attempts by querying Firestore by email
    try {
      const usersRef = collection(db, "users");
      const q = query(usersRef, where("email", "==", email));
      const querySnapshot = await getDocs(q);
      if (!querySnapshot.empty) {
        const userDoc = querySnapshot.docs[0];
        let attempts = userDoc.data().failedAttempts || 0;
        attempts++;
        const updates = { failedAttempts: attempts };
        if (attempts >= 3) updates.locked = true;
        await updateDoc(userDoc.ref, updates);
      }
    } catch(err){ console.warn(err); }

    showToast(`Login Failed: ${error.message}`, "danger");
    await logUserActivity({ email, action: "Login Failed", errorMessage: error.message });
  } finally { spinner.remove(); }
});

// Reset Password / Unlock Account
document.getElementById('resetPasswordBtn').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  if (!email) return showToast("Please enter your email first.", "warning");

  try {
    await sendPasswordResetEmail(auth, email);
    showToast("Password reset email sent. Please check your inbox.", "success");

    // Unlock the account in Firestore
    const usersRef = collection(db, "users");
    const q = query(usersRef, where("email", "==", email));
    const querySnapshot = await getDocs(q);
    if (!querySnapshot.empty) {
      const userDoc = querySnapshot.docs[0];
      await updateDoc(userDoc.ref, { locked: false, failedAttempts: 0 });
      showToast("Account unlocked. You may now log in with new password.", "success");
    }

    await logUserActivity({ email, action: "Password Reset / Unlock requested" });

  } catch(err) {
    showToast(`Failed to send reset email: ${err.message}`, "danger");
    console.warn(err);
  }
});

// Toggle password visibility
document.getElementById('togglePassword').addEventListener('click', function(){
  const pwInput = document.getElementById('loginPassword');
  pwInput.type = pwInput.type === "password" ? "text" : "password";
  this.classList.toggle('bi-eye');
  this.classList.toggle('bi-eye-slash');
});
</script>
</body>
</html>
