<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VNCEFLIX - Live Sports</title>
<link rel="icon" type="image/png" href="img/logo.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

<style>
:root {
  --bg: #0A1120;
  --accent: #E50914;
  --card-bg: #1B1F3B;
  --muted: #98A0B3;
  --border-soft-white: rgba(255,255,255,0.3);
  --badge-live-color: rgba(255,69,69,0.85);
}

body {
  margin: 0;
  background: var(--bg);
  color: #fff;
  font-family: Arial, sans-serif;
  padding-top: 80px;
}

/* ==================== PRELOADER ==================== */
#preloader-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.4s ease;
}
#preloader-overlay.fade-out { opacity: 0; pointer-events: none; }
.four-box-spinner { display: flex; flex-wrap: wrap; gap: 5px; width: 50px; height: 50px; }
.four-box-spinner div { width: 20px; height: 20px; background: #E50914; animation: boxFade 1.2s infinite ease-in-out; }
.four-box-spinner div:nth-child(2){animation-delay:0.2s;}
.four-box-spinner div:nth-child(3){animation-delay:0.4s;}
.four-box-spinner div:nth-child(4){animation-delay:0.6s;}
@keyframes boxFade {0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);}}

/* NAVBAR */
.navbar { transition: all .3s ease; background-color: transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 999; padding: 10px 40px; }
.navbar.scrolled { background-color: #0A1120; box-shadow: 0 3px 10px rgba(0,0,0,.5); }
.navbar .nav-link { color: #fff !important; font-weight: 500; transition: .3s; }
.navbar .nav-link.active { font-weight: 700; }
@media(max-width:768px){ .navbar { padding: 10px 15px; } }

/* HEADER */
.page-header { margin:0 40px 16px 40px; }
.page-header .title { font-weight:700; font-size:1.5rem; }
.page-header .subtitle { color: var(--muted); font-size:0.95rem; margin-top:4px; }

/* CATEGORIES */
.categories-label { margin:16px 40px 12px 40px; font-weight:700; font-size:1.2rem; color:#fff; }
#categories-wrapper { position:relative; margin:0 40px 24px 40px; }
#categories {
  display:flex; gap:16px; flex-wrap:nowrap;
  overflow-x:hidden; scroll-behavior: smooth;
  scroll-snap-type: x mandatory;
}
.sport-card { flex:0 0 220px; height:100px; border-radius:12px;
  background:linear-gradient(135deg,#141A29,#1E253B);
  border:1px solid rgba(255,255,255,0.05);
  color:#fff; font-weight:600; text-align:center;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition: transform 0.2s ease, border 0.2s ease, background 0.3s ease;
  scroll-snap-align: start;
}
.sport-card.active { border:2px solid var(--accent); background:linear-gradient(135deg,#E50914,#B5060F); }
.sport-card:hover { transform: translateY(-4px); border-color: var(--accent); background:linear-gradient(135deg,#E50914,#B5060F); }
.sport-card i { font-size:2rem; margin-bottom:6px; }

.carousel-btn { position:absolute; top:50%; transform:translateY(-50%);
  background: rgba(0,0,0,0.5); border:none; color:#fff;
  font-size:1.5rem; cursor:pointer; z-index:10; padding:6px 10px;
  border-radius:6px;
}
#prevBtn{left:-10px;} #nextBtn{right:-10px;}

/* MATCH GRID */
.popular-search-row { display:flex; justify-content:space-between; align-items:center; margin:16px 40px 8px 40px; }
.popular-label { font-weight:600; font-size:1.2rem; color:#fff; }
.search-input { flex-shrink:0; width:250px; }
.search-input input { background:#0b1220; border:1px solid rgba(255,255,255,0.03); color:#fff; width:100%; padding:8px 10px; border-radius:8px; }

.match-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap:16px;
  margin:0 40px 24px 40px;
}
@media(min-width:1400px){ .match-grid { grid-template-columns: repeat(5, 1fr); } }

.match-card { border-radius:12px; background:var(--card-bg); border:1px solid rgba(255,255,255,0.05);
  cursor:pointer; position:relative; overflow:hidden; height:160px; display:flex; justify-content:center; align-items:center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.match-card:hover { transform: translateY(-6px); box-shadow:0 6px 16px rgba(0,0,0,0.5); }

.match-card img.poster { width:100%; height:100%; object-fit:cover; border-radius:12px; }

/* TNT/ESPN/NBA TV logos */
.match-card.logo-tile { background: transparent; display:flex; justify-content:center; align-items:center; border: 2px solid var(--border-soft-white); border-radius: 12px; height: 140px; }
.match-card.logo-tile img.poster { max-width:140px; max-height:120px; object-fit:contain; margin:auto; display:block; }

.match-card .overlay { position:absolute; bottom:0; left:0; right:0; height:100%; display:flex; justify-content:center; align-items:flex-end; background:linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.9) 100%); padding:12px; }
.match-title { font-weight:600; font-size:0.9rem; color:#fff; text-align:center; text-shadow:0 0 4px rgba(0,0,0,0.8); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.badge-live { position:absolute; top:6px; left:6px; background: var(--badge-live-color); color:#fff; font-size:0.7rem; padding:3px 6px; border-radius:999px; font-weight:600; z-index:5; animation:pulse 1s infinite; }
@keyframes pulse { 0%{transform:scale(1);opacity:1;} 50%{transform:scale(1.2);opacity:0.8;} 100%{transform:scale(1);opacity:1;} }

/* FALLBACK POSTER */
.fallback-poster {
  background: linear-gradient(135deg, #1B1F3B, #141A29);
  width: 100%;
  height: 100%;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  color: rgba(255,255,255,0.9);
  font-size: 0.95rem;
  font-weight: 600;
  padding-bottom: 12px;
  text-align: center;
}

/* PLAYER VIEW */
.player-view { display:none; flex-direction:column; gap:12px; margin:0 40px 32px 40px; }
.player-header-line { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
.back-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.9rem; }

.stream-wrapper { display:flex; align-items:center; gap:8px; }
.stream-wrapper label { font-weight:600; font-size:0.9rem; color:#fff; white-space:nowrap; }
.stream-selector { background:#0b1220; border:1px solid rgba(255,255,255,0.03); border-radius:6px; color:#fff; padding:4px 12px; font-size:0.9rem; min-width:160px; }

.player-frame { width:100%; height:calc(100vh - 160px); border-radius:10px; border:none; background:#000; }
.player-fallback { color:var(--muted); text-align:center; padding:28px; border-radius:8px; background:rgba(255,255,255,0.02); }

/* ==================== MOBILE RESPONSIVE ==================== */
@media(max-width:992px){
  /* HEADER */
  .page-header { margin:0 16px 12px 16px; }
  .page-header .title { font-size:1.2rem; }
  .page-header .subtitle { font-size:0.85rem; }

  /* CATEGORIES */
  #categories-wrapper { margin:0 16px 16px 16px; }
  .categories-label { margin:12px 16px 8px 16px; font-size:1rem; }
  #categories { overflow-x:auto; gap:12px; scroll-snap-type: x mandatory; }
  .sport-card { flex:0 0 140px; height:80px; font-size:0.85rem; }
  .sport-card i { font-size:1.5rem; margin-bottom:4px; }
  .carousel-btn { display:none; }

  /* POPULAR ROW */
  .popular-search-row { flex-direction:column; align-items:flex-start; gap:8px; margin:16px 16px 8px 16px; }
  .search-input { width:100%; }

  /* MATCH GRID */
  .match-grid { margin:0 16px 16px 16px; gap:12px; }
  /* Make always-on grid scrollable horizontally */
  #alwaysOnGrid {
    display:flex;
    overflow-x:auto;
    gap:12px;
    flex-wrap:nowrap;
    padding-bottom:8px;
  }
  #alwaysOnGrid .match-card.logo-tile { flex:0 0 140px; height:80px; }

  /* PLAYER VIEW */
  .player-view { margin:0 16px 16px 16px; }
  .player-frame { height:300px; }
  .player-header-line { flex-direction:column; align-items:flex-start; gap:6px; }
  .stream-selector { width:100%; min-width:auto; }
}
</style>
</head>
<body>

  <div class="container-fluid px-0">
    <a class="navbar-brand d-flex align-items-center" href="index.html">

    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>

      <ul class="navbar-nav me-auto">

<div class="page-header" id="pageHeader">
  <div class="title">LIVE SPORTS</div>
  <div class="subtitle">Watch live sports from around the world</div>
</div>

<div class="categories-label" id="categoriesLabel">Categories</div>
<div id="categories-wrapper">
  <button class="carousel-btn" id="prevBtn"><i class='bx bx-chevron-left'></i></button>
  <button class="carousel-btn" id="nextBtn"><i class='bx bx-chevron-right'></i></button>
  <div id="categories"></div>
</div>

<div class="categories-label" id="alwaysOnLabel">24/7</div>
<div class="match-grid" id="alwaysOnGrid"></div>

<div class="popular-search-row" id="popularRow">
  <div class="popular-label">Popular Live</div>
  <div class="search-input">
    <input id="searchInput" placeholder="Search match or team..." />
  </div>
</div>
<div class="match-grid" id="matchGrid"></div>

<div class="player-view" id="playerView"></div>

<!-- PRELOADER -->
<div id="preloader-overlay">
  <div class="four-box-spinner">
    <div></div><div></div><div></div><div></div>
  </div>
</div>

<script>
// SCRIPT SAME AS YOUR ORIGINAL
const categoriesEl = document.getElementById('categories');
const matchGrid = document.getElementById('matchGrid');
const alwaysOnGrid = document.getElementById('alwaysOnGrid');
const searchInput = document.getElementById('searchInput');
const playerView = document.getElementById('playerView');
const categoriesLabel = document.getElementById('categoriesLabel');
const alwaysOnLabel = document.getElementById('alwaysOnLabel');
const popularRow = document.getElementById('popularRow');
const preloader = document.getElementById('preloader-overlay');

let lastMatches = [], currentStreams = [], playerActive = false;

function showLoader(show = true){
  if(show){
    preloader.style.display = 'flex';
    preloader.classList.remove('fade-out');
  } else {
    preloader.classList.add('fade-out');
    setTimeout(()=>preloader.style.display='none',400);
  }
}

const sportIcons = { football:'fa-futbol', basketball:'fa-basketball', tennis:'fa-table-tennis-paddle-ball', cricket:'fa-baseball-bat-ball', hockey:'fa-hockey-puck', baseball:'fa-baseball', volleyball:'fa-volleyball' };
const BASE_URL="https://streamed.pk";

async function fetchJson(url){try{const r=await fetch(url);return r.ok?await r.json():null}catch(e){console.error(e);return null;}}
function getPoster(homeBadge,awayBadge,poster,title){const lower=title?.toLowerCase();if(lower?.includes('tnt')||lower?.includes('espn')||lower?.includes('nba tv'))return null;if(poster)return `${BASE_URL}${poster}.webp`;if(homeBadge&&awayBadge)return `${BASE_URL}/api/images/poster/${homeBadge}/${awayBadge}.webp`;return null;}

async function loadCategories(){
  showLoader();
  const sports=await fetchJson(`${BASE_URL}/api/sports`);
  if(!sports){showLoader(false);return;}
  categoriesEl.innerHTML='';
  sports.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='sport-card'+(i===0?' active':'');
    el.innerHTML=`<i class="fa-solid ${sportIcons[s.id]||'fa-trophy'}"></i>${s.name}`;
    el.onclick=()=>{document.querySelectorAll('.sport-card').forEach(c=>c.classList.remove('active'));el.classList.add('active');loadMatches(s.id);};
    categoriesEl.appendChild(el);
  });
  await loadMatches(sports[0].id);
  showLoader(false);
}

document.getElementById('prevBtn').onclick=()=>categoriesEl.scrollBy({left:-200,behavior:'smooth'});
document.getElementById('nextBtn').onclick=()=>categoriesEl.scrollBy({left:200,behavior:'smooth'});

async function loadMatches(sport){
  showLoader();
  const data=await fetchJson(`${BASE_URL}/api/matches/${sport}/popular`);
  if(!data||!data.length){showLoader(false);return;}
  lastMatches=data;
  renderAlwaysOn(data);
  renderMatches(data);
  showLoader(false);
}

function renderAlwaysOn(matches){
  alwaysOnGrid.innerHTML='';
  matches.filter(m=>m.title&&m.title.toLowerCase().match(/tnt|espn|nba tv/)).forEach(m=>createMatchCard(m,alwaysOnGrid,true));
}

function renderMatches(matches){
  matchGrid.innerHTML='';
  matches.filter(m=>m.title&&!m.title.toLowerCase().match(/tnt|espn|nba tv/)).forEach(m=>createMatchCard(m,matchGrid));
  matchGrid.classList.add('fade-in');
  setTimeout(()=>matchGrid.classList.remove('fade-in'),300);
}

function createMatchCard(match,container,isAlwaysOn=false){
  const lower=match.title.toLowerCase();
  const card=document.createElement('div');
  if(isAlwaysOn){
    card.className='match-card logo-tile';
    if(lower.includes('tnt'))card.innerHTML=`<img src="assets/img/sports logo/NBA/tnt.png" class="poster bordered-logo" alt="TNT">`;
    if(lower.includes('espn'))card.innerHTML=`<img src="assets/img/sports logo/NBA/espn.png" class="poster bordered-logo" alt="ESPN">`;
    if(lower.includes('nba tv'))card.innerHTML=`<img src="assets/img/sports logo/NBA/nbatv.png" class="poster bordered-logo" alt="NBA TV">`;
  } else{
    card.className='match-card';
    const poster=getPoster(match.teams?.home?.badge,match.teams?.away?.badge,match.poster,match.title);
    const isLive=match.isLive||(match.sources&&match.sources.length>0);
    if(poster){card.innerHTML=`${isLive?'<div class="badge-live">LIVE</div>':''}<img src="${poster}" class="poster" alt="${match.title}" onerror="this.src='img/fallback.png'"><div class="overlay"><div class="match-title">${match.title}</div></div>`;}
    else{card.innerHTML=`${isLive?'<div class="badge-live">LIVE</div>':''}<div class="fallback-poster">${match.title}</div>`;}
  }
  card.onclick=()=>playMatchSplit(match);
  container.appendChild(card);
}

async function playMatchSplit(match){
  if(!match.sources?.length){alert("No streams available.");return;}
  playerActive=true;
  showLoader();

  ['categories','alwaysOnGrid','matchGrid','categoriesLabel','alwaysOnLabel','popularRow','prevBtn','nextBtn','searchInput'].forEach(id=>document.getElementById(id)?.style.setProperty('display','none'));

  playerView.style.display='flex';
  playerView.innerHTML=`<div class="player-header-line">
  <button class="back-btn" id="backBtnSplit">← Back to Matches</button>
  <div class="stream-wrapper">
    <label for="streamSelectorSplit">Source:</label>
    <select id="streamSelectorSplit" class="stream-selector"></select>
  </div></div>
  <iframe id="livePlayerSplit" class="player-frame" allow="autoplay; fullscreen"></iframe>`;

  const livePlayerNew=document.getElementById('livePlayerSplit');
  const streamSelectorNew=document.getElementById('streamSelectorSplit');
  const backBtnNew=document.getElementById('backBtnSplit');

  currentStreams=match.sources;
  streamSelectorNew.innerHTML='';
  currentStreams.forEach((s,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent=s.source;streamSelectorNew.appendChild(opt);});

  await loadStreamSplit(0,livePlayerNew);
  showLoader(false);

  streamSelectorNew.onchange=e=>loadStreamSplit(e.target.value,livePlayerNew);

  backBtnNew.onclick=async()=>{
    livePlayerNew.src="";
    playerView.style.display='none';
    playerActive=false;
    ['categories','alwaysOnGrid','matchGrid','categoriesLabel','alwaysOnLabel','popularRow','prevBtn','nextBtn','searchInput'].forEach(id=>document.getElementById(id)?.style.removeProperty('display'));
    const activeSport=document.querySelector('.sport-card.active')?.textContent.trim().toLowerCase();
    if(activeSport){const sportObj=Object.keys(sportIcons).find(k=>activeSport.includes(k));loadMatches(sportObj||'basketball');}
  };
}

async function loadStreamSplit(i,playerEl){
  showLoader();
  const s=currentStreams[i];
  if(!s){showLoader(false);return;}
  const res=await fetchJson(`${BASE_URL}/api/stream/${s.source}/${s.id}`);
  playerEl.src=res?.[0]?.embedUrl||"";
  showLoader(false);
}

searchInput.oninput=e=>{const q=e.target.value.toLowerCase();renderMatches(lastMatches.filter(m=>m.title?.toLowerCase().includes(q)));};

window.addEventListener('scroll',()=>{document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>50);});

// Auto-refresh matches if player not active
setInterval(async()=>{
  if(!lastMatches.length||playerActive)return;
  const updatedMatches=await fetchJson(`${BASE_URL}/api/matches/current`);
  if(updatedMatches&&updatedMatches.length>0){lastMatches=updatedMatches;renderMatches(updatedMatches);renderAlwaysOn(updatedMatches);}
},10000);

loadCategories();
</script>
</body>
