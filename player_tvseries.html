<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VNCEFLIX TV Series Player</title>
<link rel="icon" href="img/logo.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:#000; color:#fff; font-family: Arial, sans-serif; }
header {
  position: fixed;
  top:0;
  left:0;
  right:0;
  z-index: 10;
  padding:6px 12px;
  background:#0A1120;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  height:70px;
}
#closeBtn, #nextBtn {
  background:#1b2436;
  border:none;
  color:#fff;
  font-weight:bold;
  font-size:0.8rem;
  padding:6px 16px;
  border-radius:999px;
  cursor:pointer;
  transition:0.2s;
}
#closeBtn:hover, #nextBtn:hover { background:#e50914; }

#episodeInfo {
  text-align:center;
  flex:1;
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:0.9rem;
}

#episodeNumber { font-weight:700; }
#episodeTitle { font-size:0.85rem; color:#ccc; }

.player-wrapper {
  position: fixed;
  top:70px;
  left:0;
  right:0;
  bottom:0;
  background:#000;
  z-index:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
#loading { position:absolute; color:#fff; font-size:1.2rem; text-align:center; }
#errorMsg {
  position:absolute;
  color:#ff4b4b;
  font-size:1rem;
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.8);
  border-radius:8px;
  display:none;
  z-index:2;
}
#playerFrame, #nextFrame {
  width:100%;
  height:100%;
  border:0;
  opacity:0;
  transition:opacity 0.3s;
}
#nextFrame { display:none; }
</style>
</head>
<body>

<header>
  <button id="closeBtn">Return to Site</button>

  <div id="episodeInfo">
    <div id="episodeNumber">S1 - E1</div>
    <div id="episodeTitle">Episode Title</div>
  </div>

  <button id="nextBtn">Next Episode</button>
</header>

<div class="player-wrapper">
  <div id="loading">Loading Episode...</div>
  <div id="errorMsg">❌ Episode not available. Please try another.</div>
  <iframe 
    id="playerFrame" 
    allowfullscreen 
    allow="autoplay; fullscreen" 
    loading="lazy"
    referrerpolicy="no-referrer">
  </iframe>
  <iframe 
    id="nextFrame" 
    allowfullscreen 
    allow="autoplay; fullscreen" 
    loading="lazy"
    referrerpolicy="no-referrer">
  </iframe>
</div>

<script>
const qs = new URLSearchParams(location.search);
let tvId = qs.get("id");
let seasonNumber = parseInt(qs.get("season"));
let episodeNumber = parseInt(qs.get("episode"));

const frame = document.getElementById("playerFrame");
const nextFrame = document.getElementById("nextFrame");
const closeBtn = document.getElementById("closeBtn");
const nextBtn = document.getElementById("nextBtn");
const loading = document.getElementById("loading");
const errorMsg = document.getElementById("errorMsg");
const episodeNumberDiv = document.getElementById("episodeNumber");
const episodeTitleDiv = document.getElementById("episodeTitle");

// TMDB API key
const TMDB_API_KEY = "9389ba9923daf721d382d253701c7ca7";

// Prefetched next episode title
let nextEpisodeTitle = "";

// Return to the TV series view page
closeBtn.onclick = () => window.location.href = `view_tvseries.html?id=${tvId}`;

// Generate VidFast TV episode URL with autoPlay
function getVidfastURL(tvId, season, episode) {
  return `https://vidfast.pro/tv/${tvId}/${season}/${episode}?autoPlay=true`;
}

// Fetch episode title from TMDB
async function fetchEpisodeTitle(tvId, season, episode) {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${season}/episode/${episode}?api_key=${TMDB_API_KEY}&language=en-US`);
    if (!res.ok) throw new Error("Episode not found");
    const data = await res.json();
    return data.name || `Episode ${episode}`;
  } catch (err) {
    console.warn(err);
    return `Episode ${episode}`;
  }
}

// Update topbar episode info
function updateEpisodeInfo(season, episode, title) {
  episodeNumberDiv.textContent = `S${season} - E${episode}`;
  episodeTitleDiv.textContent = title;
}

// Prefetch next episode
async function prefetchNextEpisode(currentSeason, currentEpisode) {
  const nextEp = currentEpisode + 1;
  nextFrame.src = getVidfastURL(tvId, currentSeason, nextEp);
  nextEpisodeTitle = await fetchEpisodeTitle(tvId, currentSeason, nextEp);
  nextFrame.onload = () => console.log(`Episode S${currentSeason}E${nextEp} prefetched.`);
}

// Load current episode
async function loadEpisode(season, episode) {
  loading.style.display = "block";
  errorMsg.style.display = "none";
  frame.style.opacity = 0;

  frame.src = getVidfastURL(tvId, season, episode);
  const title = await fetchEpisodeTitle(tvId, season, episode);
  updateEpisodeInfo(season, episode, title);

  const failTimeout = setTimeout(() => {
    loading.style.display = "none";
    errorMsg.style.display = "block";
  }, 8000);

  frame.onload = () => {
    clearTimeout(failTimeout);
    loading.style.display = "none";
    frame.style.opacity = 1;
  };

  prefetchNextEpisode(season, episode);
}

// Next episode button
nextBtn.onclick = () => {
  episodeNumber += 1;
  errorMsg.style.display = "none";
  frame.src = nextFrame.src;
  frame.style.opacity = 1;
  loading.style.display = "none";
  updateEpisodeInfo(seasonNumber, episodeNumber, nextEpisodeTitle);
  prefetchNextEpisode(seasonNumber, episodeNumber);
};

// Initialize player
loadEpisode(seasonNumber, episodeNumber);
</script>

</body>
</html>
