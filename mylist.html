<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My List - VNCEFLIX</title>
  <meta name="description" content="Your saved movies and TV shows list on VNCEFLIX.">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    :root { --gutter-left: 60px; --card-radius:12px; --bg:#0A1120; --accent:#E50914; }
    body { margin:0; background:var(--bg); color:#fff; font-family:Arial,sans-serif; overflow-x:hidden; padding-top:70px; }
    .navbar.transparent { background-color: transparent !important; }
    .navbar.scrolled { background-color: var(--bg) !important; }
    .navbar .container-fluid { padding-left: 60px; padding-right: 60px; }
    .toast-container { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
    .toast { background: rgba(20,20,20,0.95) !important; color: #fff !important; border-radius:30px; font-size:0.9rem; box-shadow:0 4px 20px rgba(0,0,0,0.5);}
    h3.mylist-title { margin-left: var(--gutter-left); margin-bottom: 16px; }
    #myListContainer { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 160px)); gap:18px; margin-left:var(--gutter-left); padding-bottom:60px; align-items:start; justify-items:start; }
    .movie-card { width:100%; transition: transform 220ms ease, box-shadow 220ms ease; position:relative; }
    .movie-card img { width:100%; border-radius:var(--card-radius); box-shadow:0 8px 20px rgba(0,0,0,0.6); display:block; }
    .movie-card img:hover { transform: scale(1.05); cursor:pointer; }
    .movie-title { text-align:center; margin-top:8px; font-size:0.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#ddd; }
    .remove-btn { position:absolute; top:8px; right:8px; background-color: rgba(229,9,20,0.92); border:none; width:32px; height:32px; display:inline-flex; align-items:center; justify-content:center; border-radius:50%; color:#fff; font-size:1.1rem; opacity:0; transform:scale(0.9); transition: opacity .25s ease, transform .25s ease; z-index:5; }
    .movie-card:hover .remove-btn { opacity:1; transform:scale(1); }
    .fade-out { opacity:0 !important; transform:scale(0.95); transition: opacity .4s ease, transform .4s ease; }
    @media (max-width: 900px) {
      #myListContainer { margin-left: 20px; grid-template-columns: repeat(auto-fill, minmax(120px, 140px)); }
      .navbar .container-fluid { padding-left:20px; padding-right:20px; }
      h3.mylist-title { margin-left:20px; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top transparent px-3">
  <a class="navbar-brand d-flex align-items-center" href="index.html">
    <img src="img/vnceflix.png" alt="VNCEFLIX Logo" height="30" class="me-2" style="margin-left:12px;">
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="all_movies.html">Movies</a></li>
      <li class="nav-item"><a class="nav-link" href="all_tvseries.html">TV Shows</a></li>
      <li class="nav-item"><a class="nav-link" href="vivamax.html">Vivamax</a></li>
      <li class="nav-item"><a class="nav-link" href="genres.html">Genres</a></li>
      <li class="nav-item"><a class="nav-link active" href="mylist.html">My List</a></li>
      <li class="nav-item"><a class="nav-link" href="iptv.html">Live TV</a></li>
      <li class="nav-item"><a class="nav-link" href="live_sports.html">Live Sports</a></li>
    </ul>
    <div class="d-flex align-items-center">
      <i class="bx bx-search text-white fs-4 me-3"></i>
      <i class="bx bx-bell text-white fs-4 me-3"></i>
      <div class="dropdown profile-dropdown">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bx bx-user-circle fs-3"></i>
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
          <li><a class="dropdown-item d-none" id="adminBtn" href="administrator.html">Administrator</a></li>
          <li><a class="dropdown-item" id="signOutBtn" href="#">Sign Out</a></li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<!-- Confirm Remove Modal -->
<div class="modal fade" id="confirmRemoveModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-0">
      <div class="modal-header border-0">
        <h5 class="modal-title">Remove from My List</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Are you sure you want to remove this item from your list?</div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="confirmRemoveBtn" class="btn btn-danger">Remove</button>
      </div>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<h3 class="mylist-title">My List</h3>
<div id="myListContainer" aria-live="polite" aria-busy="false"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// ================= FIREBASE CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyBeCgogR5-ZgaU9eD_XwzH_L5LkT0TOcPc",
  authDomain: "vnce-7b54c.firebaseapp.com",
  projectId: "vnce-7b54c",
  storageBucket: "vnce-7b54c.appspot.com",
  messagingSenderId: "137661927526",
  appId: "1:137661927526:web:e649aceeb57126a2945da7",
  measurementId: "G-BBRNMV2ZG0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("myListContainer");
const toastContainer = document.getElementById("toastContainer");
const signOutBtn = document.getElementById("signOutBtn");
const confirmRemoveBtn = document.getElementById("confirmRemoveBtn");
let selectedItem = null;

// ================= TMDB CONSTANTS =================
const TMDB_KEY = "9389ba9923daf721d382d253701c7ca7";
const TMDB = "https://api.themoviedb.org/3";
const IMG = "https://image.tmdb.org/t/p/w500";
const FALLBACK = "img/fallback_poster.jpg";

// ================= UTILITIES =================
function showToast(msg) {
  const el = document.createElement("div");
  el.className = "toast align-items-center text-white px-3 py-2";
  el.innerHTML = `<div>${msg}</div>`;
  toastContainer.appendChild(el);
  const t = new bootstrap.Toast(el, { delay: 2200 });
  t.show();
  el.addEventListener("hidden.bs.toast", () => el.remove());
}

function normalizePosterURL(item) {
  if (!item) return FALLBACK;
  if (item.posterURL?.startsWith("http")) return item.posterURL;
  if (item.poster_path) return `${IMG}${item.poster_path}`;
  if (item.poster) return item.poster;
  return FALLBACK;
}

// ✅ FIXED: Accurate TMDB type detection (using /search/multi)
async function fetchMediaType(item) {
  const title = item.name || item.title || item.movieName;
  if (!title) return "unknown";

  try {
    const res = await fetch(`${TMDB}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`);
    if (!res.ok) return "unknown";
    const data = await res.json();

    if (!data.results || data.results.length === 0) return "unknown";

    // Find closest match by comparing IDs if available
    const match = data.results.find(r => String(r.id) === String(item.id)) || data.results[0];

    return match.media_type === "tv" ? "tv" : "movie";
  } catch (err) {
    console.error("TMDB type detection failed:", err);
  }
  return "unknown";
}

function detailPageFor(item, type) {
  const id = item.id || item.movieId || item.tvseriesId;
  if (type === "tv") return `view_tvseries.html?id=${encodeURIComponent(id)}`;
  return `view_genres.html?id=${encodeURIComponent(id)}`;
}

// ================= LOAD MY LIST =================
async function loadMyList(user) {
  container.innerHTML = `<div class="text-secondary ms-3">Loading your list...</div>`;

  try {
    const listRef = collection(db, "users", user.uid, "mylist");
    const snapshot = await getDocs(listRef);

    if (snapshot.empty) {
      container.innerHTML = `<div class="text-center text-secondary">Your list is empty.</div>`;
      return;
    }

    container.innerHTML = "";
    for (const docSnap of snapshot.docs) {
      const item = docSnap.data();
      const docId = docSnap.id;
      const posterURL = normalizePosterURL(item);
      const title = item.movieName || item.title || item.name || "Untitled";

      const card = document.createElement("div");
      card.className = "movie-card";
      card.innerHTML = `
        <button class="remove-btn" title="Remove"><i class='bx bx-x'></i></button>
        <img src="${posterURL}" alt="${title}" onerror="this.src='${FALLBACK}'">
      `;
      container.appendChild(card);

      // ✅ Determine media type automatically
      const mediaType = await fetchMediaType(item);

      card.querySelector("img").addEventListener("click", () => {
        const targetUrl = detailPageFor(item, mediaType);
        window.location.href = targetUrl;
      });

      card.querySelector(".remove-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        selectedItem = { user, docId, card, title };
        new bootstrap.Modal(document.getElementById("confirmRemoveModal")).show();
      });
    }
  } catch (err) {
    console.error("Error loading list:", err);
    container.innerHTML = `<div class="text-center text-danger">Error loading your list.</div>`;
  }
}

// ================= REMOVE ITEM =================
confirmRemoveBtn.addEventListener("click", async () => {
  if (!selectedItem) return;
  const { user, docId, card, title } = selectedItem;

  try {
    const docRef = doc(db, "users", user.uid, "mylist", docId);
    await deleteDoc(docRef);
    card.classList.add("fade-out");
    setTimeout(() => card.remove(), 400);
    showToast(`Removed "${title}" from your list`);
  } catch (err) {
    console.error("Remove failed:", err);
    showToast("Failed to remove item");
  }

  bootstrap.Modal.getInstance(document.getElementById("confirmRemoveModal"))?.hide();
});

// ================= AUTH =================
onAuthStateChanged(auth, (user) => {
  if (!user) {
    container.innerHTML = `<div class="text-center text-danger">Please sign in to view your list.</div>`;
    return;
  }
  loadMyList(user);
  const adminBtn = document.getElementById("adminBtn");
  if (user.email === "vnceflix_admin@gmail.com") adminBtn.classList.remove("d-none");
});

signOutBtn?.addEventListener("click", async (e) => {
  e.preventDefault();
  await signOut(auth);
  showToast("Signed out");
  setTimeout(() => (window.location.href = "index.html"), 700);
});

// ================= NAVBAR SCROLL =================
window.addEventListener("scroll", () => {
  document.querySelector(".navbar").classList.toggle("scrolled", window.scrollY > 50);
});
</script>
</body>
</html>
