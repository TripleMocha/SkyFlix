<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VNCEFLIX - Vivamax Player</title>
<link rel="icon" href="img/logo.png" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Header Bar */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  padding: 4px 12px;
  background: #0A1120;
  display: flex;
  align-items: center;
  justify-content: flex-start; /* align button to left */
  height: 50px; /* reduced height */
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

#closeBtn {
  background: #1b2436;
  border: none;
  color: #fff;
  font-weight: bold;
  font-size: 0.9rem;
  padding: 5px 16px;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.2s;
}
#closeBtn:hover { background: #e50914; }

/* Player Wrapper */
.player-wrapper {
  position: fixed;
  top: 50px; /* adjusted for new header height */
  left: 0;
  right: 0;
  bottom: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
}

#loading {
  position: absolute;
  color: #fff;
  font-size: 1.2rem;
  text-align: center;
  z-index: 5;
}
#errorMsg {
  position: absolute;
  color: #ff4b4b;
  font-size: 1rem;
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.8);
  border-radius: 8px;
  display: none;
  z-index: 5;
}

/* Video Frame */
#playerFrame {
  width: 100%;
  height: 100%;
  border: 0;
  opacity: 0;
  transition: opacity 0.3s ease-in;
}
</style>
</head>
<body>

<header>
  <button id="closeBtn">Return to Site</button>
</header>

<div class="player-wrapper">
  <div id="loading">🎬 Loading Movie...</div>
  <div id="errorMsg">❌ Movie not available. Please try another.</div>
  <iframe
    id="playerFrame"
    allowfullscreen
    allow="autoplay; fullscreen"
    loading="lazy"
    referrerpolicy="no-referrer">
  </iframe>
</div>

<script>
const qs = new URLSearchParams(location.search);
const movieId = qs.get("id");

const frame = document.getElementById("playerFrame");
const closeBtn = document.getElementById("closeBtn");
const loading = document.getElementById("loading");
const errorMsg = document.getElementById("errorMsg");

// ✅ Return to Vivamax details page
closeBtn.onclick = () => window.location.href = `view_vivamax.html?id=${movieId}`;

// ✅ Correct VidFast Embed with autoplay
function getVidfastURL(id) {
  return `https://vidfast.pro/movie/${id}?autoPlay=true`;
}

// ✅ Load and play movie
function loadMovie(id) {
  loading.style.display = "block";
  errorMsg.style.display = "none";
  frame.style.opacity = 0;

  frame.src = getVidfastURL(id);

  const failTimeout = setTimeout(() => {
    loading.style.display = "none";
    errorMsg.style.display = "block";
  }, 8000);

  frame.onload = () => {
    clearTimeout(failTimeout);
    loading.style.display = "none";
    frame.style.opacity = 1;
  };
}

// Initialize player
if (movieId) {
  loadMovie(movieId);
} else {
  errorMsg.textContent = "❌ Invalid movie ID.";
  errorMsg.style.display = "block";
}
</script>

</body>
</html>
